<!DOCTYPE html>
<html lang="zh_CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#4A90D9">
    <meta name="description" content="MCJS 1.8.8 - 网页版 Minecraft">
    <title>404 - 这个方块不存在 | MCJS 1.8.8</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        :root {
            --mc-green: #5A9B3C;
            --mc-green-dark: #3D7A25;
            --mc-brown: #8B5A2B;
            --mc-dark: #1a1a1a;
            --mc-darker: #0d0d0d;
            --mc-text: #FFFFFF;
            --mc-accent: #4A90D9;
        }
        html, body {
            width: 100%;
            height: 100%;
            font-family: 'Courier New', monospace;
            background: var(--mc-darker);
            color: var(--mc-text);
            overflow: hidden;
        }
        #app {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        .block-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: grid;
            grid-template-columns: repeat(auto-fill, 32px);
            grid-template-rows: repeat(auto-fill, 32px);
            opacity: 0.1;
            pointer-events: none;
        }
        .block {
            width: 32px;
            height: 32px;
            position: relative;
        }
        .block::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 25%;
            background: linear-gradient(180deg, #5A9B3C 0%, #4A8B2C 50%, #3A7B1C 100%);
        }
        .block::after {
            content: '';
            position: absolute;
            top: 25%;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(180deg, #8B5A2B 0%, #7A4A1B 50%, #6A3A0B 100%);
        }
        .missing-block {
            width: 128px;
            height: 128px;
            position: relative;
            margin-bottom: 2rem;
            background: linear-gradient(135deg, #333 0%, #222 100%);
            border: 4px dashed #555;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .missing-block::before {
            content: '?';
            font-size: 5rem;
            font-weight: bold;
            color: #666;
        }
        .title {
            font-size: 2rem;
            font-weight: bold;
            text-shadow: 3px 3px 0 #000;
            margin-bottom: 1rem;
            color: #888;
            letter-spacing: 2px;
        }
        .message {
            font-size: 1rem;
            color: #666;
            margin-bottom: 2rem;
            text-align: center;
            max-width: 400px;
            line-height: 1.6;
        }
        .home-btn {
            padding: 15px 40px;
            background: linear-gradient(180deg, var(--mc-green) 0%, var(--mc-green-dark) 100%);
            border: none;
            color: white;
            font-family: inherit;
            font-size: 1rem;
            cursor: pointer;
            border-radius: 4px;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-decoration: none;
            transition: transform 0.2s;
        }
        .home-btn:hover {
            transform: scale(1.05);
        }
        .error-code {
            font-size: 4rem;
            font-weight: bold;
            color: var(--mc-green);
            text-shadow: 4px 4px 0 #000;
            margin-bottom: 0.5rem;
        }
        @media (max-width: 600px) {
            .title { font-size: 1.5rem; }
            .error-code { font-size: 3rem; }
            .missing-block { width: 96px; height: 96px; }
            .missing-block::before { font-size: 3rem; }
        }
    </style>
</head>
<body>
    <div id="app">
        <div class="block-bg" id="block-bg"></div>
        <div class="error-code">404</div>
        <div class="missing-block"></div>
        <div class="title">这个方块不存在</div>
        <div class="message">
            你似乎迷路了。这个位置在 Minecraft 世界中还没有被生成。<br>
            让我们回到主世界吧。
        </div>
        <a href="/" class="home-btn">返回首页</a>
    </div>
    <script>
        (function() {
            var bg = document.getElementById('block-bg');
            var count = Math.ceil(window.innerWidth / 32) * Math.ceil(window.innerHeight / 32) + 20;
            for (var i = 0; i < count; i++) {
                var block = document.createElement('div');
                block.className = 'block';
                bg.appendChild(block);
            }
        })();
    </script>
</body>
</html>
