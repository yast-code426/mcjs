<!DOCTYPE html>
<html style="width:100%;height:100%;background-color:black;" lang="zh-CN">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0" />
		<meta name="description" content="MCJS 1.8.8 - Web Minecraft" />
		<title>MCJS 1.8.8</title>
		<script src="https://cdn.jsdelivr.net/npm/pako@2.1.0/dist/pako.min.js"></script>
		<style>
			#loading {
				position: fixed; top: 0; left: 0; width: 100%; height: 100%;
				display: flex; flex-direction: column; align-items: center; justify-content: center;
				background: #000; color: #aaa; font-family: monospace; z-index: 9999;
			}
			#loading .bar { width: 300px; height: 8px; background: #222; border-radius: 4px; margin-top: 16px; overflow: hidden; }
			#loading .fill { width: 0%; height: 100%; background: #4A90D9; border-radius: 4px; transition: width 0.3s; }
			#loading .text { margin-top: 10px; font-size: 13px; color: #666; }
		</style>
		<script type="text/javascript">
			"use strict";

			function fetchAndDecompress(url, label) {
				return fetch(url).then(function(r) {
					if (!r.ok) throw new Error("Failed to fetch " + url + ": " + r.status);
					return r.arrayBuffer();
				}).then(function(buf) {
					var bytes = new Uint8Array(buf);
					// Check if it's gzip (starts with 0x1f 0x8b)
					if (bytes[0] === 0x1f && bytes[1] === 0x8b) {
						return pako.inflate(bytes).buffer;
					}
					return buf;
				});
			}

			function setProgress(pct, text) {
				var fill = document.getElementById("fill");
				var textEl = document.getElementById("load-text");
				if (fill) fill.style.width = pct + "%";
				if (textEl) textEl.textContent = text;
			}

			async function bootGame() {
				try {
					setProgress(5, "Loading classes.js.gz ...");
					var classesBuf = await fetchAndDecompress("classes.js.gz", "classes");
					setProgress(50, "Loading assets.epk.gz ...");

					// Fetch assets in parallel with script preparation
					var assetsPromise = fetchAndDecompress("assets.epk.gz", "assets");

					setProgress(60, "Executing game code ...");
					// Create blob URL for classes.js and execute it
					var blob = new Blob([classesBuf], { type: "text/javascript" });
					var scriptUrl = URL.createObjectURL(blob);
					var script = document.createElement("script");
					script.src = scriptUrl;
					script.onload = function() {
						URL.revokeObjectURL(scriptUrl);
					};
					document.head.appendChild(script);

					// Wait for script to load and execute
					await new Promise(function(resolve, reject) {
						script.onload = resolve;
						script.onerror = function() { reject(new Error("Failed to load classes.js")); };
					});

					setProgress(80, "Preparing assets ...");
					var assetsBuf = await assetsPromise;

					setProgress(90, "Starting game ...");

					// Override fetch to serve assets.epk from memory
					var assetsBlob = new Blob([assetsBuf]);
					var assetsUrl = URL.createObjectURL(assetsBlob);
					var origFetch = window.fetch;
					window.fetch = function(url, opts) {
						if (typeof url === "string" && url.indexOf("assets.epk") !== -1 && url.indexOf(".gz") === -1) {
							return origFetch(assetsUrl, opts);
						}
						return origFetch(url, opts);
					};

					// Hide loading screen
					var loading = document.getElementById("loading");
					if (loading) loading.style.display = "none";

					// Configure and start game
					var relayId = 2;
					window.eaglercraftXOpts = {
						demoMode: false,
						container: "game_frame",
						assetsURI: "assets.epk",
						localesURI: "lang/",
						lang: "zh_CN",
						worldsDB: "worlds",
						logInvalidCerts: false,
						crashOnUncaughtExceptions: false,
						allowUpdateDL: false,
						allowFNAWSkins: false,
						allowVoiceClient: false,
						checkRelaysForUpdates: false,
						enableMinceraft: false,
						showBootMenuOnLaunch: false,
						allowBootMenu: false,
						relays: [
							{ addr: "wss://relay.deev.is/", comment: "lax1dude relay #1", primary: relayId === 0 },
							{ addr: "wss://relay.lax1dude.net/", comment: "lax1dude relay #2", primary: relayId === 1 },
							{ addr: "wss://relay.shhnowisnottheti.me/", comment: "ayunami relay #1", primary: relayId === 2 }
						]
					};
					var q = window.location.search;
					if((typeof q === "string") && q[0] === "?" && (typeof window.URLSearchParams !== "undefined")) {
						q = new window.URLSearchParams(q);
						var s = q.get("server");
						if(s) window.eaglercraftXOpts.joinServer = s;
					}
					main();
				} catch(e) {
					setProgress(0, "Error: " + e.message);
					console.error(e);
				}
			}

			window.addEventListener("load", function() {
				if(window.location.href.indexOf("file:") === 0) {
					alert("Please deploy via HTTP server or GitHub Pages, do not open this file locally.");
				} else {
					bootGame();
				}
			});
		</script>
	</head>
	<body style="margin:0px;width:100%;height:100%;overflow:hidden;background-color:black;" id="game_frame">
		<div id="loading">
			<div style="font-size:18px;color:#ccc;">MCJS 1.8.8</div>
			<div class="bar"><div class="fill" id="fill"></div></div>
			<div class="text" id="load-text">Initializing ...</div>
		</div>
	</body>
</html>
