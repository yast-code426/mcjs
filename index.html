<!DOCTYPE html>
<html style="width:100%;height:100%;background-color:black;" lang="zh-CN">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0" />
		<meta name="description" content="YastCraft 1.8.8 - 网页版 Minecraft | By yast" />
		<meta name="author" content="Yast" />
		<title>YastCraft1.8.8</title>
		<script src="https://cdn.jsdelivr.net/npm/pako@2.1.0/dist/pako.min.js"></script>
		<!-- 本地化配置与注入器(在游戏代码加载前生效) -->
		<script src="localization/config.js"></script>
		<script src="localization/patcher.js"></script>
		<style>
			#loading {
				position: fixed; top: 0; left: 0; width: 100%; height: 100%;
				display: flex; flex-direction: column; align-items: center; justify-content: center;
				background: linear-gradient(180deg, #0d0d0d 0%, #1a1a1a 100%);
				color: #aaa; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
				z-index: 9999; user-select: none;
			}
			#loading .logo {
				font-size: 28px; font-weight: 700; color: #e0e0e0;
				letter-spacing: 2px; margin-bottom: 4px;
				text-shadow: 0 0 10px rgba(74, 144, 217, 0.3);
			}
			#loading .version {
				font-size: 12px; color: #4A90D9; font-weight: 600;
				margin-bottom: 24px; letter-spacing: 1px;
			}
			#loading .bar {
				width: 320px; height: 6px; background: #2a2a2a;
				border-radius: 3px; margin-top: 16px; overflow: hidden;
				box-shadow: inset 0 1px 2px rgba(0,0,0,0.5);
			}
			#loading .fill {
				width: 0%; height: 100%; background: linear-gradient(90deg, #4A90D9, #6ab0f9);
				border-radius: 3px; transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
				box-shadow: 0 0 8px rgba(74, 144, 217, 0.4);
			}
			#loading .text { margin-top: 12px; font-size: 13px; color: #777; }
			#loading .error {
				color: #e74c3c; margin-top: 12px; font-size: 13px;
				max-width: 320px; text-align: center; line-height: 1.5;
			}
			#loading .footer {
				position: absolute; bottom: 16px; font-size: 11px; color: #555;
				text-align: center;
			}
			#loading .footer a { color: #4A90D9; text-decoration: none; }
		</style>
		<script type="text/javascript">
			"use strict";

			var L = window.MCJS_LOCALIZATION || {};
			var LC = L.loading || {};
			var LB = L.brand || {};
			var BUILD_VERSION = L.buildVersion || "unknown";
			var CACHE_KEY = "mcjs_v_" + BUILD_VERSION;

			function fetchAndDecompress(url) {
				var separator = url.indexOf("?") === -1 ? "?" : "&";
				var bustUrl = url + separator + "v=" + BUILD_VERSION;
				return fetch(bustUrl, { cache: "no-store" }).then(function(r) {
					if (!r.ok) throw new Error("无法获取 " + url + ",HTTP状态码: " + r.status);
					return r.arrayBuffer();
				}).then(function(buf) {
					var bytes = new Uint8Array(buf);
					if (bytes[0] === 0x1f && bytes[1] === 0x8b) {
						return pako.inflate(bytes).buffer;
					}
					return buf;
				});
			}

			function sleep(ms) { return new Promise(function(r) { setTimeout(r, ms); }); }

			function computeHash(buffer) {
				var bytes = new Uint8Array(buffer);
				var hash = 0;
				for (var i = 0; i < bytes.length; i += 512) {
					hash = ((hash << 5) - hash + bytes[i]) | 0;
				}
				return (hash >>> 0).toString(16);
			}

			function validateFile(buffer, name) {
				var size = buffer.byteLength;
				var hash = computeHash(buffer);
				var stored = localStorage.getItem(CACHE_KEY + "_" + name);
				var current = size + "_" + hash;
				var updated = stored !== null && stored !== current;
				var isNew = stored === null;
				if (updated) {
					console.log("[YastCraft] ⚠ " + name + " 检测到更新! (旧:" + stored + " 新:" + current + ")");
				}
				localStorage.setItem(CACHE_KEY + "_" + name, current);
				return { size: size, hash: hash, updated: updated, isNew: isNew };
			}

			async function fetchResourceWithValidation(url, name, downloadPct, decompressPct, verifyPct) {
				var separator = url.indexOf("?") === -1 ? "?" : "&";
				var bustUrl = url + separator + "v=" + BUILD_VERSION;
				var label = name.charAt(0).toUpperCase() + name.slice(1);
				/* 第1步：下载 */
				setProgress(downloadPct, (LC["download" + label] || "正在下载 " + name + "..."));
				await sleep(80);
				var buf = await fetch(bustUrl, { cache: "no-store" }).then(function(r) {
					if (!r.ok) throw new Error("无法获取 " + url + ",HTTP状态码: " + r.status);
					return r.arrayBuffer();
				});
				/* 第2步：解压 */
				setProgress(decompressPct, (LC["decompress" + label] || "正在解压 " + name + "..."));
				await sleep(80);
				var bytes = new Uint8Array(buf);
				if (bytes[0] === 0x1f && bytes[1] === 0x8b) {
					buf = pako.inflate(bytes).buffer;
				}
				/* 第3步：校验 (哈希对比) */
				setProgress(verifyPct, (LC["verify" + label] || "正在校验 " + name + " 完整性...（对比缓存哈希）"));
				await sleep(150);
				var info = validateFile(buf, name);
				/* 如果缓存与服务器不一致 → 重下载 */
				if (info.updated) {
					setProgress(verifyPct + 2, LC.reDownload || "⚠ 缓存与服务器不一致！正在重新下载...");
					await sleep(200);
					console.log("[YastCraft] " + name + " 缓存与服务器不一致，执行重新下载...");
					buf = await fetch(bustUrl, { cache: "no-store" }).then(function(r) {
						if (!r.ok) throw new Error("无法获取 " + url + ",HTTP状态码: " + r.status);
						return r.arrayBuffer();
					});
					setProgress(verifyPct + 4, (LC["decompress" + label] || "正在解压 " + name + "..."));
					await sleep(80);
					bytes = new Uint8Array(buf);
					if (bytes[0] === 0x1f && bytes[1] === 0x8b) {
						buf = pako.inflate(bytes).buffer;
					}
					info = validateFile(buf, name);
				}
				return { buffer: buf, info: info };
			}

			function setProgress(pct, text) {
				var fill = document.getElementById("fill");
				var textEl = document.getElementById("load-text");
				if (fill) fill.style.width = pct + "%";
				if (textEl) textEl.textContent = text;
			}

			// ===== 性能监控 =====
			var _perfTimers = {};
			function perfStart(name) { _perfTimers[name] = performance.now(); }
			function perfEnd(name) {
				if (_perfTimers[name]) {
					var elapsed = (performance.now() - _perfTimers[name]).toFixed(1);
					console.log('[YastCraft] \u23f1 ' + name + ': ' + elapsed + 'ms');
					delete _perfTimers[name];
				}
			}

			// ===== WebGL 兼容性检测 =====
			function detectWebGLSupport() {
				var canvas = document.createElement('canvas');
				var gl = null;
				var exts = {};
				try {
					gl = canvas.getContext('webgl2') || canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
				} catch(e) {}
				if (gl) {
					exts = {
						aniso: gl.getExtension('EXT_texture_filter_anisotropic') || gl.getExtension('WEBKIT_EXT_texture_filter_anisotropic'),
						floatTex: gl.getExtension('OES_texture_float'),
						halfFloat: gl.getExtension('OES_texture_half_float'),
						depthTex: gl.getExtension('WEBGL_depth_texture'),
						drawBuffers: gl.getExtension('WEBGL_draw_buffers'),
						s3tc: gl.getExtension('WEBGL_compressed_texture_s3tc') || gl.getExtension('WEBKIT_WEBGL_compressed_texture_s3tc'),
						etc1: gl.getExtension('WEBGL_compressed_texture_etc1'),
						etc2: gl.getExtension('WEBGL_compressed_texture_etc')
					};
				}
				return {
					supported: !!gl,
					version: gl ? (canvas.getContext('webgl2') ? 'webgl2' : 'webgl') : null,
					extensions: exts,
					renderer: gl ? gl.getParameter(gl.RENDERER) : 'unknown',
					vendor: gl ? gl.getParameter(gl.VENDOR) : 'unknown'
				};
			}

			// ===== 内存优化: 定期清理未使用的缓存 =====
			function cleanupStaleCache() {
				try {
					var currentVersion = localStorage.getItem('mcjs_build_version');
					var keysToRemove = [];
					for (var i = 0; i < localStorage.length; i++) {
						var key = localStorage.key(i);
						if (key && key.indexOf('mcjs_v_') === 0 && key.indexOf(currentVersion) === -1) {
							keysToRemove.push(key);
						}
					}
					// 只清理超过 5 条的旧版本缓存,避免频繁删除
					if (keysToRemove.length > 5) {
						keysToRemove.forEach(function(k) { localStorage.removeItem(k); });
						console.log('[YastCraft] 已清理 ' + keysToRemove.length + ' 条旧版本缓存');
					}
				} catch(e) {
					// localStorage 可能不可用,忽略
				}
			}

			// ===== 加载重试计数 =====
			var _bootRetryCount = 0;
			var _maxBootRetries = 2;

			// ===== 移动端优化: 防止双击缩放和触摸延迟 =====
			document.addEventListener('touchstart', function() {}, {passive: true});
			document.addEventListener('touchmove', function(e) {
				// 如果游戏 canvas 存在, 允许触摸事件通过
				var gameCanvas = document.querySelector('canvas') || document.getElementById('game_frame');
				if (gameCanvas && gameCanvas.contains(e.target)) {
					// 游戏内部处理触摸
				}
			}, {passive: true});

			async function bootGame() {
				var scriptUrl = null;
				var assetsUrl = null;
				try {
					perfStart('bootGame - 总耗时');
					setProgress(5, LC.loadAssets || "正在加载游戏资源 ...");

					var staleKey = localStorage.getItem("mcjs_build_version");
					if (staleKey && staleKey !== CACHE_KEY) {
						console.log("[YastCraft] 检测到版本更新 (" + staleKey + " -> " + CACHE_KEY + "), 清除旧缓存");
						Object.keys(localStorage).forEach(function(k) {
							if (k.indexOf("mcjs_v_") === 0) localStorage.removeItem(k);
						});
					}
					localStorage.setItem("mcjs_build_version", CACHE_KEY);
					cleanupStaleCache();

					/* 第一步：下载 → 解压 → 校验游戏源码 */
					var classesResult = await fetchResourceWithValidation("classes.js.gz", "classes", 10, 20, 25);
					var classesBuf = classesResult.buffer;
					var classesInfo = classesResult.info;
					console.log("[YastCraft] classes.js 大小:" + classesInfo.size + " 哈希:" + classesInfo.hash);
					if (classesInfo.updated) {
						setProgress(30, LC.updatedDone || "游戏源码已更新至最新版本 ✓");
						console.log("[YastCraft] ★ 游戏源码已更新至最新版本");
					} else if (classesInfo.isNew) {
						setProgress(30, LC.cachedFirst || "游戏源码已缓存 ✓");
						console.log("[YastCraft] ★ 首次缓存游戏源码");
					} else {
						setProgress(30, LC.unchanged || "游戏源码无变化，使用缓存 ✓");
						console.log("[YastCraft] ✓ 游戏源码无变化，使用现有版本");
					}
					await sleep(120);
					perfEnd('bootGame - 下载classes');

					/* 第二步：下载 → 解压 → 校验资源包 */
					var assetsResult = await fetchResourceWithValidation("assets.epk.gz", "assets", 35, 45, 50);
					var assetsBuf = assetsResult.buffer;
					var assetsInfo = assetsResult.info;
					console.log("[YastCraft] assets.epk 大小:" + assetsInfo.size + " 哈希:" + assetsInfo.hash);
					if (assetsInfo.updated) {
						setProgress(55, LC.updatedDone || "资源包已更新至最新版本 ✓");
						console.log("[YastCraft] ★ 资源包已更新至最新版本");
					} else if (assetsInfo.isNew) {
						setProgress(55, LC.cachedFirst || "资源包已缓存 ✓");
						console.log("[YastCraft] ★ 首次缓存资源包");
					} else {
						setProgress(55, LC.unchanged || "资源包无变化，使用缓存 ✓");
						console.log("[YastCraft] ✓ 资源包无变化，使用现有版本");
					}
					await sleep(120);
					perfEnd('bootGame - 下载assets');

					setProgress(58, LC.validateDone || "资源校验全部完成 ✓");
					await sleep(100);

					setProgress(60, LC.executeCode || "正在执行游戏代码 ...");

					var classesText = new TextDecoder("utf-8").decode(classesBuf);
					if (window.MCJS_Patcher && window.MCJS_Patcher.patchClassesSource) {
						classesText = window.MCJS_Patcher.patchClassesSource(classesText);
					}

					var blob = new Blob([classesText], { type: "text/javascript" });
					scriptUrl = URL.createObjectURL(blob);
					var script = document.createElement("script");
					script.src = scriptUrl;

					await new Promise(function(resolve, reject) {
						script.onload = function() {
							if (scriptUrl) {
								URL.revokeObjectURL(scriptUrl);
								scriptUrl = null;
							}
							resolve();
						};
						script.onerror = function() {
							if (scriptUrl) {
								URL.revokeObjectURL(scriptUrl);
								scriptUrl = null;
							}
							reject(new Error("加载游戏代码失败"));
						};
						document.head.appendChild(script);
					});

					perfEnd('bootGame - 执行代码');
					setProgress(80, LC.prepareAssets || "正在准备资源 ...");

					var assetsBlob = new Blob([assetsBuf]);
					assetsUrl = URL.createObjectURL(assetsBlob);
					var origFetch = window.fetch;
					window.fetch = function(url, opts) {
						if (typeof url === "string" && url.indexOf("assets.epk") !== -1 && url.indexOf(".gz") === -1) {
							return origFetch(assetsUrl, opts);
						}
						return origFetch(url, opts);
					};

					setProgress(90, LC.startGame || "正在启动游戏 ...");

					var loading = document.getElementById("loading");
					if (loading) {
						loading.style.opacity = "0";
						loading.style.transition = "opacity 0.5s";
						setTimeout(function() {
							if (loading) loading.style.display = "none";
						}, 500);
					}

					var relayId = 0;
					window.yastCraftOpts = {
						demoMode: false,
						container: "game_frame",
						assetsURI: "assets.epk",
						localesURI: "lang/",
						lang: "zh_CN",
						worldsDB: "worlds",
						logInvalidCerts: false,
						crashOnUncaughtExceptions: false,
						allowUpdateDL: false,
						allowFNAWSkins: false,
						allowVoiceClient: false,
						checkRelaysForUpdates: false,
						enableMinceraft: false,
						showBootMenuOnLaunch: false,
						allowBootMenu: false,
						relays: (L.relays || []).map(function(r, i) {
							if (r.primary) relayId = i;
							return { addr: r.addr, comment: r.comment, primary: !!r.primary };
						})
					};
					var q = window.location.search;
					if((typeof q === "string") && q[0] === "?" && (typeof window.URLSearchParams !== "undefined")) {
						q = new window.URLSearchParams(q);
						var s = q.get("server");
						if(s) window.yastCraftOpts.joinServer = s;
					}

					if (window.MCJS_Patcher && window.MCJS_Patcher.applyRuntimeHooks) {
						window.MCJS_Patcher.applyRuntimeHooks();
					}

					perfEnd('bootGame - 总耗时');
					main();
				} catch(e) {
					setProgress(0, (LC.loadFailed || "加载失败: ") + e.message);
					console.error(e);
					if (scriptUrl) {
						URL.revokeObjectURL(scriptUrl);
					}
					if (assetsUrl) {
						URL.revokeObjectURL(assetsUrl);
					}
					// ===== 错误恢复: 自动重试 =====
					if (_bootRetryCount < _maxBootRetries) {
						_bootRetryCount++;
						var retryMsg = (LC.retryLoad || '加载失败, 3 秒后自动重试... (第 %d 次)');
						setProgress(0, retryMsg.replace('%d', _bootRetryCount));
						console.warn('[YastCraft] 第 ' + _bootRetryCount + ' 次加载失败, 即将重试...');
						await sleep(3000);
						// 清除旧的对象URL
						if (scriptUrl) { URL.revokeObjectURL(scriptUrl); scriptUrl = null; }
						if (assetsUrl) { URL.revokeObjectURL(assetsUrl); assetsUrl = null; }
						return bootGame();
					}
				}
			}

			window.addEventListener("load", function() {
				if(window.location.href.indexOf("file:") === 0) {
					alert(LC.localFileWarning || "请通过 HTTP 服务器或 GitHub Pages 部署,不要在本地直接打开此文件。");
				} else {
					bootGame();
				}
			});
		</script>
	</head>
	<body style="margin:0px;width:100%;height:100%;overflow:hidden;background-color:black;" id="game_frame">
		<div id="loading">
			<div class="logo" id="loading-logo"></div>
			<div class="version" id="loading-version"></div>
			<div class="bar"><div class="fill" id="fill"></div></div>
			<div class="text" id="load-text">正在初始化 ...</div>
			<div class="footer" id="loading-footer"></div>
		</div>
		<script>
			(function(){
				var logoEl = document.getElementById("loading-logo");
				var verEl = document.getElementById("loading-version");
				var footerEl = document.getElementById("loading-footer");
				var textEl = document.getElementById("load-text");
				if (logoEl) logoEl.textContent = LB.name || "MCJS";
				if (verEl) verEl.textContent = LC.versionText || (LB.version || "1.8.8");
				if (textEl) textEl.textContent = LC.initText || "正在初始化 ...";
				if (footerEl) {
					footerEl.innerHTML = "由 <b>" + (LB.author || "Yast") + "</b> 制作 | <a href=\"" + (LB.websiteUrl || "#") + "\" target=\"_blank\">" + (LB.website || "") + "</a>";
				}
			})();
		</script>
	</body>
</html>
