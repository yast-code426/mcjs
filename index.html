<head>

    <link rel="manifest" href="manifest.webmanifest">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect width='16' height='16' fill='%238B4513'/%3E%3Crect x='0' y='0' width='16' height='4' fill='%23568F3C'/%3E%3Crect x='0' y='4' width='16' height='12' fill='%238B4513'/%3E%3Crect x='2' y='6' width='4' height='4' fill='%23654321'/%3E%3Crect x='10' y='10' width='4' height='4' fill='%23654321'/%3E%3C/svg%3E">
    <title>MCJS 1.8.8 - Web Minecraft</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        :root {
            --mc-green: #5A9B3C;
            --mc-green-dark: #3D7A25;
            --mc-brown: #8B5A2B;
            --mc-dark: #1a1a1a;
            --mc-darker: #0d0d0d;
            --mc-text: #FFFFFF;
            --mc-accent: #4A90D9;
        }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Courier New', monospace;
            background: var(--mc-darker);
            color: var(--mc-text);
        }
        #app {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }
        .block-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: grid;
            grid-template-columns: repeat(auto-fill, 32px);
            grid-template-rows: repeat(auto-fill, 32px);
            opacity: 0.15;
            pointer-events: none;
            image-rendering: pixelated;
        }
        .block {
            width: 32px;
            height: 32px;
            position: relative;
        }
        .block::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 25%;
            background: linear-gradient(180deg, #5A9B3C 0%, #4A8B2C 50%, #3A7B1C 100%);
        }
        .block::after {
            content: '';
            position: absolute;
            top: 25%;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(180deg, #8B5A2B 0%, #7A4A1B 50%, #6A3A0B 100%);
        }
        .block:nth-child(3n)::before { background: linear-gradient(180deg, #6AAB4C 0%, #5A9B3C 50%, #4A8B2C 100%); }
        .block:nth-child(5n)::after { background: linear-gradient(180deg, #9B6A3B 0%, #8B5A2B 50%, #7A4A1B 100%); }
        .block:nth-child(7n)::before { background: linear-gradient(180deg, #4A8B2C 0%, #3A7B1C 50%, #2A6B0C 100%); }
        .block:nth-child(11n)::after { background: linear-gradient(180deg, #7A4A1B 0%, #6A3A0B 50%, #5A2A00 100%); }
        #loading-screen, #error-screen, #portrait-warning {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            background: var(--mc-darker);
        }
        .hidden { display: none !important; }
        .title {
            font-size: 2.5rem;
            font-weight: bold;
            text-shadow: 4px 4px 0 #000, -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000;
            margin-bottom: 0.5rem;
            letter-spacing: 4px;
            color: var(--mc-green);
        }
        .subtitle {
            font-size: 1rem;
            color: #888;
            margin-bottom: 2rem;
            letter-spacing: 2px;
        }
        .progress-container {
            width: 80%;
            max-width: 400px;
            margin: 1rem 0;
        }
        .progress-bar {
            width: 100%;
            height: 24px;
            background: #1a1a1a;
            border: 4px solid #333;
            position: relative;
            overflow: hidden;
        }
        .progress-bar::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 50%;
            background: linear-gradient(180deg, rgba(255,255,255,0.2) 0%, transparent 100%);
            z-index: 2;
        }
        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(180deg, #7CFC00 0%, #5A9B3C 50%, #3D7A25 100%);
            transition: width 0.1s ease-out;
            position: relative;
        }
        .progress-fill::after {
            content: '';
            position: absolute;
            top: 2px;
            left: 2px;
            right: 2px;
            height: 6px;
            background: linear-gradient(180deg, rgba(255,255,255,0.5) 0%, transparent 100%);
        }
        .status-text {
            font-size: 1rem;
            color: #aaa;
            margin-top: 1rem;
            text-align: center;
            min-height: 1.5rem;
        }
        .progress-text {
            font-size: 0.9rem;
            color: #666;
            margin-top: 0.5rem;
        }
        .timer {
            font-size: 1.2rem;
            color: var(--mc-accent);
            margin-top: 0.5rem;
            font-variant-numeric: tabular-nums;
        }
        .cached-badge {
            background: var(--mc-green);
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 4px;
            font-size: 1rem;
            margin-top: 1rem;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        #game-frame {
            width: 100%;
            height: 100%;
            border: none;
            display: none;
        }
        #fullscreen-btn, #settings-btn {
            position: fixed;
            width: 48px;
            height: 48px;
            background: rgba(0,0,0,0.7);
            border: 3px solid var(--mc-green);
            border-radius: 4px;
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 50;
            transition: background 0.2s;
        }
        #fullscreen-btn:hover, #settings-btn:hover {
            background: rgba(74, 144, 217, 0.5);
        }
        #fullscreen-btn {
            bottom: 20px;
            right: 20px;
        }
        #settings-btn {
            top: 20px;
            right: 20px;
        }
        #fullscreen-btn svg, #settings-btn svg {
            width: 28px;
            height: 28px;
            fill: var(--mc-green);
        }
        #settings-panel {
            position: fixed;
            top: 0;
            right: -320px;
            width: 300px;
            height: 100%;
            background: linear-gradient(180deg, #2a2a2a 0%, #1a1a1a 100%);
            border-left: 4px solid var(--mc-green);
            z-index: 200;
            transition: right 0.3s ease;
            overflow-y: auto;
            padding: 20px;
        }
        #settings-panel.open {
            right: 0;
        }
        #settings-panel h3 {
            color: var(--mc-green);
            font-size: 1.3rem;
            margin-bottom: 1.5rem;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .setting-group {
            margin-bottom: 1.5rem;
        }
        .setting-group label {
            display: block;
            color: #aaa;
            font-size: 0.85rem;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .setting-group select, .setting-group input {
            width: 100%;
            padding: 10px;
            background: #1a1a1a;
            border: 2px solid #444;
            color: white;
            font-family: inherit;
            font-size: 1rem;
            border-radius: 4px;
        }
        .setting-group select:focus, .setting-group input:focus {
            outline: none;
            border-color: var(--mc-green);
        }
        .setting-btn {
            width: 100%;
            padding: 12px;
            margin-top: 0.5rem;
            background: linear-gradient(180deg, #444 0%, #333 100%);
            border: 2px solid #555;
            color: white;
            font-family: inherit;
            font-size: 0.9rem;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .setting-btn:hover {
            background: linear-gradient(180deg, #555 0%, #444 100%);
            border-color: var(--mc-green);
        }
        .setting-btn.danger {
            border-color: #d9534f;
        }
        .setting-btn.danger:hover {
            background: linear-gradient(180deg, #d9534f 0%, #c9433f 100%);
        }
        .setting-btn.fullscreen-btn {
            background: linear-gradient(180deg, var(--mc-green) 0%, var(--mc-green-dark) 100%);
            border-color: var(--mc-green);
        }
        .setting-btn.fullscreen-btn:hover {
            background: linear-gradient(180deg, #6AAB4C 0%, var(--mc-green) 100%);
        }
        #panel-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 150;
            display: none;
        }
        #panel-overlay.show {
            display: block;
        }
        #error-screen {
            text-align: center;
            padding: 20px;
        }
        #error-screen h2 {
            color: #d9534f;
            font-size: 2rem;
            margin-bottom: 1rem;
        }
        #error-screen p {
            color: #888;
            margin-bottom: 1rem;
            max-width: 400px;
        }
        #retry-btn {
            padding: 15px 40px;
            background: linear-gradient(180deg, var(--mc-green) 0%, var(--mc-green-dark) 100%);
            border: none;
            color: white;
            font-family: inherit;
            font-size: 1.1rem;
            cursor: pointer;
            border-radius: 4px;
            margin-top: 1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        #retry-btn:hover {
            transform: scale(1.05);
        }
        #portrait-warning {
            z-index: 1000;
        }
        #portrait-warning .rotate-icon {
            width: 80px;
            height: 80px;
            border: 4px solid var(--mc-green);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1.5rem;
            animation: rotate-hint 2s ease-in-out infinite;
        }
        #portrait-warning .rotate-icon svg {
            width: 50px;
            height: 50px;
            fill: var(--mc-green);
        }
        @keyframes rotate-hint {
            0%, 100% { transform: rotate(0deg); }
            50% { transform: rotate(90deg); }
        }
        #portrait-warning p {
            color: #aaa;
            font-size: 1rem;
            text-align: center;
            max-width: 250px;
        }
        .about-section {
            margin-top: 2rem;
            padding-top: 1rem;
            border-top: 2px solid #333;
            text-align: center;
            color: #666;
            font-size: 0.8rem;
        }
        .about-section a {
            color: var(--mc-accent);
            text-decoration: none;
        }
        .about-section a:hover {
            text-decoration: underline;
        }
        #loading-screen .version {
            font-size: 0.9rem;
            color: #555;
            margin-top: 2rem;
        }
        @media (max-width: 600px) {
            .title { font-size: 1.8rem; }
            .progress-container { width: 90%; }
            #settings-panel { width: 260px; right: -280px; }
            #fullscreen-btn, #settings-btn { width: 44px; height: 44px; }
        }
        @keyframes slideIn {
            from { transform: translateX(20px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        .slide-in {
            animation: slideIn 0.3s ease forwards;
        }
    </style>
</head>
<body>
    <div id="app">
        <div class="block-bg" id="block-bg"></div>
        
        <div id="loading-screen">
            <div class="title">MCJS 1.8.8</div>
            <div class="subtitle">WEB MINECRAFT</div>
            <div class="progress-container">

                    <div class="progress-fill" id="progress-fill"></div>

                <svg viewBox="0 0 24 24"><path d="M7.34 6.41L.86 12.9l6.49 6.48 6.49-6.48-6.5-6.49zM3.69 12.9l3.66-3.66L11 12.9l-3.66 3.66-3.65-3.66zm15.67-6.26A8.95 8.95 0 0 0 13 4V.76L8.76 5 13 9.24V6c1.79 0 3.58.68 4.95 2.05a7.007 7.007 0 0 1 0 9.9 6.973 6.973 0 0 1-7.79 1.44l-1.49 1.49C10.02 21.62 11.51 22 13 22c2.3 0 4.61-.88 6.36-2.64a8.98 8.98 0 0 0 0-12.72z"/></svg>

        </button>

        <button id="settings-btn" title="设置">
            <svg viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.31.06-.63.06-.94 0-.31-.02-.63-.06-.94l2.03-1.58a.49.49 0 0 0 .12-.61l-1.92-3.32a.488.488 0 0 0-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54a.484.484 0 0 0-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.04.31-.06.63-.06.94s.02.63.06.94l-2.03 1.58a.49.49 0 0 0-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>
        </button>

        <div id="panel-overlay"></div>
        <div id="settings-panel">
            <h3>设置</h3>
            <div class="setting-group">
                <label>语言</label>
                <select id="lang-select">
                    <option value="zh_CN">中文</option>
                    <option value="en_US">English</option>
                </select>
            </div>
            <div class="setting-group">
                <label>服务器地址</label>
                <input type="text" id="server-input" placeholder="输入服务器地址...">
            </div>
            <div class="setting-group">
                <button class="setting-btn fullscreen-btn" id="settings-fullscreen-btn">全屏游戏</button>
            </div>
            <div class="setting-group">
                <button class="setting-btn" id="clear-cache-btn">清除缓存</button>
                <button class="setting-btn danger" id="close-panel-btn">关闭面板</button>
            </div>
            <div class="about-section">
                <p>MCJS 1.8.8</p>

    <script src="https://cdn.jsdelivr.net/npm/pako@2.1.0/dist/pako.min.js"></script>
    <script>
    (function() {
        const DB_NAME = 'mcjs_cache_db';
        const DB_VERSION = 1;
        const STORE_NAME = 'cache_store';
        const CACHE_KEY = 'mcjs_cache';
        const CACHE_VER_KEY = 'mcjs_cache_ver';

        const CLASSES_GZ = 'classes.js.gz';
        const ASSETS_GZ = 'assets.epk.gz';

        let db = null;
        let startTime = 0;
        let timerInterval = null;
        let isCached = false;
        let cachedData = null;

        const progressFill = document.getElementById('progress-fill');
        const statusText = document.getElementById('status-text');
        const progressText = document.getElementById('progress-text');
        const timerEl = document.getElementById('timer');
        const cachedInfo = document.getElementById('cached-info');
        const loadingScreen = document.getElementById('loading-screen');
        const errorScreen = document.getElementById('error-screen');
        const gameFrame = document.getElementById('game-frame');
        const fullscreenBtn = document.getElementById('fullscreen-btn');
        const settingsBtn = document.getElementById('settings-btn');
        const settingsPanel = document.getElementById('settings-panel');
        const panelOverlay = document.getElementById('panel-overlay');
        const langSelect = document.getElementById('lang-select');
        const serverInput = document.getElementById('server-input');
        const clearCacheBtn = document.getElementById('clear-cache-btn');
        const closePanelBtn = document.getElementById('close-panel-btn');
        const settingsFullscreenBtn = document.getElementById('settings-fullscreen-btn');
        const retryBtn = document.getElementById('retry-btn');
        const portraitWarning = document.getElementById('portrait-warning');

        function generateBlockBackground() {
            const bg = document.getElementById('block-bg');
            const count = Math.ceil(window.innerWidth / 32) * Math.ceil(window.innerHeight / 32) + 20;
            bg.innerHTML = '';
            for (let i = 0; i < count; i++) {
                const block = document.createElement('div');
                block.className = 'block';
                bg.appendChild(block);
            }
        }

        function openFullscreen() {
            const elem = document.documentElement;
            if (elem.requestFullscreen) {
                elem.requestFullscreen();
            } else if (elem.webkitRequestFullscreen) {
                elem.webkitRequestFullscreen();
            } else if (elem.msRequestFullscreen) {
                elem.msRequestFullscreen();
            }
        }

        function toggleSettings() {
            const isOpen = settingsPanel.classList.contains('open');
            if (isOpen) {
                settingsPanel.classList.remove('open');
                panelOverlay.classList.remove('show');
            } else {
                settingsPanel.classList.add('open');
                panelOverlay.classList.add('show');
            }
        }

        function initSettings() {
            const savedLang = localStorage.getItem('mcjs_lang') || 'zh_CN';
            const savedServer = localStorage.getItem('mcjs_server') || '';
            langSelect.value = savedLang;
            serverInput.value = savedServer;
            
            langSelect.addEventListener('change', function() {
                localStorage.setItem('mcjs_lang', this.value);
            });
            
            serverInput.addEventListener('change', function() {
                localStorage.setItem('mcjs_server', this.value);
            });

            clearCacheBtn.addEventListener('click', async function() {
                if (confirm('确定要清除所有缓存吗？下次加载需要重新下载。')) {
                    await clearAllCache();
                    location.reload();
                }
            });

            closePanelBtn.addEventListener('click', toggleSettings);
            settingsFullscreenBtn.addEventListener('click', openFullscreen);
            fullscreenBtn.addEventListener('click', openFullscreen);
            settingsBtn.addEventListener('click', toggleSettings);
            panelOverlay.addEventListener('click', toggleSettings);

            retryBtn.addEventListener('click', function() {
                location.reload();
            });
        }

        function checkPortrait() {
            const isPortrait = window.innerHeight > window.innerWidth;
            const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
            portraitWarning.classList.toggle('hidden', !isPortrait || !isMobile);
        }

        function updateTimer() {
            const elapsed = Math.floor((Date.now() - startTime) / 1000);
            const mins = Math.floor(elapsed / 60).toString().padStart(2, '0');
            const secs = (elapsed % 60).toString().padStart(2, '0');
            timerEl.textContent = `${mins}:${secs}`;
        }

        function setProgress(percent) {
            progressFill.style.width = `${Math.min(100, Math.max(0, percent))}%`;
        }

        function setStatus(text) {
            statusText.textContent = text;
        }

        function setSubProgress(text) {
            progressText.textContent = text;
        }

        function showError(title, message) {
            document.getElementById('error-title').textContent = title;
            document.getElementById('error-message').textContent = message;
            loadingScreen.classList.add('hidden');
            errorScreen.classList.remove('hidden');
        }

        function openDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, DB_VERSION);
                request.onerror = () => reject(request.error);
                request.onsuccess = () => {
                    db = request.result;
                    resolve(db);
                };
                request.onupgradeneeded = (event) => {
                    const database = event.target.result;
                    if (!database.objectStoreNames.contains(STORE_NAME)) {
                        database.createObjectStore(STORE_NAME);
                    }
                };
            });
        }

        function dbGet(key) {
            return new Promise((resolve, reject) => {
                if (!db) {
                    resolve(null);
                    return;
                }
                const tx = db.transaction(STORE_NAME, 'readonly');
                const store = tx.objectStore(STORE_NAME);
                const request = store.get(key);
                request.onerror = () => reject(request.error);
                request.onsuccess = () => resolve(request.result);
            });
        }

        function dbPut(key, value) {
            return new Promise((resolve, reject) => {
                if (!db) {
                    reject(new Error('Database not initialized'));
                    return;
                }
                const tx = db.transaction(STORE_NAME, 'readwrite');
                const store = tx.objectStore(STORE_NAME);
                const request = store.put(value, key);
                request.onerror = () => reject(request.error);
                request.onsuccess = () => resolve();
            });
        }

        function dbDelete(key) {
            return new Promise((resolve, reject) => {
                if (!db) {
                    resolve();
                    return;
                }
                const tx = db.transaction(STORE_NAME, 'readwrite');
                const store = tx.objectStore(STORE_NAME);
                const request = store.delete(key);
                request.onerror = () => reject(request.error);
                request.onsuccess = () => resolve();
            });
        }

        async function clearAllCache() {
            try {
                if (db) {
                    const tx = db.transaction(STORE_NAME, 'readwrite');
                    const store = tx.objectStore(STORE_NAME);
                    store.clear();
                }
                if ('caches' in window) {
                    const names = await caches.keys();
                    for (const name of names) {
                        if (name.startsWith('mcjs-cache')) {
                            await caches.delete(name);
                        }
                    }
                }
            } catch (e) {
                console.warn('Clear cache warning:', e);
            }
        }

        async function checkForUpdates(url) {
            try {
                const response = await fetch(url, { method: 'HEAD' });
                return {
                    etag: response.headers.get('ETag'),
                    lastModified: response.headers.get('Last-Modified')
                };
            } catch {
                return null;
            }
        }

        async function downloadWithProgress(url, totalSize, onProgress) {
            return new Promise((resolve, reject) => {
                const xhr = new XMLHttpRequest();
                xhr.open('GET', url, true);
                xhr.responseType = 'arraybuffer';

                xhr.onprogress = (event) => {
                    if (event.lengthComputable) {
                        const percent = (event.loaded / totalSize) * 100;
                        onProgress(event.loaded, totalSize, percent);
                    }
                };

                xhr.onload = () => {
                    if (xhr.status >= 200 && xhr.status < 300) {
                        resolve(new Uint8Array(xhr.response));
                    } else {
                        reject(new Error(`Download failed: ${xhr.status}`));
                    }
                };

                xhr.onerror = () => reject(new Error('Network error'));
                xhr.send();
            });
        }

        async function loadFromCacheOrDownload() {
            setStatus('正在连接服务器...');
            setProgress(0);
            
            try {
                await openDB();
            } catch (e) {
                console.warn('IndexedDB init failed, continuing without cache:', e);
            }

            const cached = await dbGet(CACHE_KEY);
            if (cached) {
                const cachedVer = await dbGet(CACHE_VER_KEY) || {};
                
                const [classesUpdate, assetsUpdate] = await Promise.all([
                    checkForUpdates(CLASSES_GZ),
                    checkForUpdates(ASSETS_GZ)
                ]);

                const classesChanged = !cachedVer.classesETag || 
                    (classesUpdate?.etag && classesUpdate.etag !== cachedVer.classesETag);
                const assetsChanged = !cachedVer.assetsETag || 
                    (assetsUpdate?.etag && assetsUpdate.etag !== cachedVer.assetsETag);

                if (!classesChanged && !assetsChanged) {
                    isCached = true;
                    cachedData = cached;
                    return;
                }

                if (classesChanged || assetsChanged) {
                    try {
                        await clearAllCache();
                    } catch (e) {}
                }
            }

            setStatus('正在下载游戏核心...');
            setProgress(5);
            
            let classesResponse, assetsResponse;
            try {
                [classesResponse, assetsResponse] = await Promise.all([
                    fetch(CLASSES_GZ),
                    fetch(ASSETS_GZ)
                ]);

                if (!classesResponse.ok) throw new Error('classes.js.gz download failed');
                if (!assetsResponse.ok) throw new Error('assets.epk.gz download failed');

                const classesTotal = parseInt(classesResponse.headers.get('content-length')) || 7000000;
                const assetsTotal = parseInt(assetsResponse.headers.get('content-length')) || 6900000;

                setStatus('正在下载资源...');
                setProgress(10);

                const classesGz = await downloadWithProgress(CLASSES_GZ, classesTotal, (loaded, total, percent) => {
                    const weighted = 10 + (loaded / total) * 40;
                    setProgress(weighted);
                    setSubProgress(`游戏核心 ${formatSize(loaded)}/${formatSize(total)}`);
                });

                setStatus('正在解压游戏核心...');
                setProgress(52);

                let classes;
                try {
                    classes = pako.ungzip(classesGz);
                } catch (e) {
                    throw new Error('游戏核心解压失败');
                }

                setStatus('正在下载资源包...');
                setProgress(55);

                const assetsGz = await downloadWithProgress(ASSETS_GZ, assetsTotal, (loaded, total, percent) => {
                    const weighted = 55 + (loaded / total) * 35;
                    setProgress(weighted);
                    setSubProgress(`资源包 ${formatSize(loaded)}/${formatSize(total)}`);
                });

                setStatus('正在解压资源包...');
                setProgress(92);

                let assets;
                try {
                    assets = pako.ungzip(assetsGz);
                } catch (e) {
                    throw new Error('资源包解压失败');
                }

                setStatus('正在保存缓存...');
                
                const cacheData = {
                    classes: classes,
                    assets: assets,
                    timestamp: Date.now()
                };

                try {
                    const etags = {
                        classesETag: classesResponse.headers.get('ETag'),
                        assetsETag: assetsResponse.headers.get('ETag')
                    };
                    await dbPut(CACHE_VER_KEY, etags);
                    await dbPut(CACHE_KEY, cacheData);
                } catch (e) {
                    console.warn('Cache save failed:', e);
                }

                cachedData = cacheData;
                setProgress(100);
            } catch (e) {
                if (cached) {
                    cachedData = cached;
                    isCached = true;
                    return;
                }
                throw e;
            }
        }

        function formatSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
            return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
        }

        function launchGame(classesData, assetsData) {
            const blob = new Blob([classesData], { type: 'application/javascript' });
            const classesUrl = URL.createObjectURL(blob);

            window.eaglercraftOpts = {
                demoMode: false,
                container: 'game_frame',
                assetsURI: 'assets.epk',
                localesURI: 'lang/',
                lang: localStorage.getItem('mcjs_lang') || 'zh_CN',
                worldsDB: 'worlds',
                logInvalidCerts: false,
                crashOnUncaughtExceptions: false,
                allowUpdateDL: false,
                allowFNAWSkins: true,
                allowVoiceClient: false,
                checkRelaysForUpdates: false,
                enableMinceraft: false,
                showBootMenuOnLaunch: false,
                allowBootMenu: false,
                relays: [
                    { addr: 'wss://relay.deev.is/', comment: 'lax1dude relay #1', primary: relayId === 0 },
                    { addr: 'wss://relay.lax1dude.net/', comment: 'lax1dude relay #2', primary: relayId === 1 },
                    { addr: 'wss://relay.shhnowisnottheti.me/', comment: 'ayunami relay #1', primary: relayId === 2 }
                ]
            };

            window.assetsOverride = { 'assets.epk': assetsData };

            const originalFetch = window.fetch;
            window.fetch = function(url, options) {
                if (typeof url === 'string' && url.endsWith('assets.epk')) {
                    return Promise.resolve(new Response(new Blob([assetsData])));
                }
                return originalFetch.apply(this, arguments);
            };

            const script = document.createElement('script');
            script.src = classesUrl;
            script.onload = () => {
                URL.revokeObjectURL(classesUrl);
            };
            script.onerror = () => {
                showError('启动失败', '游戏脚本加载失败，请刷新重试。');
            };
            document.head.appendChild(script);

            loadingScreen.classList.add('hidden');
            gameFrame.style.display = 'block';
            gameFrame.style.width = '100%';
            gameFrame.style.height = '100%';
            fullscreenBtn.style.display = 'flex';
            settingsBtn.style.display = 'flex';

            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('sw.js').catch(e => {
                    console.warn('SW registration failed:', e);
                });
            }
        }

        async function init() {
            startTime = Date.now();
            timerInterval = setInterval(updateTimer, 1000);
            
            generateBlockBackground();
            initSettings();
            checkPortrait();
            
            window.addEventListener('resize', generateBlockBackground);
            window.addEventListener('orientationchange', checkPortrait);
            window.addEventListener('resize', checkPortrait);

            try {
                await loadFromCacheOrDownload();
            } catch (e) {
                clearInterval(timerInterval);
                showError('加载失败', e.message || '网络错误，请检查连接后重试。');
                return;
            }

            if (isCached) {
                setStatus('从缓存加载，秒开！');
                setProgress(100);
                cachedInfo.textContent = '缓存已加载';
                cachedInfo.classList.remove('hidden');
                await new Promise(r => setTimeout(r, 500));
            } else {
                setStatus('即将开始...');
                await new Promise(r => setTimeout(r, 300));
            }

            clearInterval(timerInterval);
            
            const relayId = Math.floor(Math.random() * 3);
            window.relayId = relayId;
            
            launchGame(cachedData.classes, cachedData.assets);
        }

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').catch(() => {});
            });
        }

        init();
    })();
    </script>
